<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
  </defs>
  <!-- Background translucent outline sheet -->
  <rect x="5" y="9" width="16" height="18" rx="4" stroke="url(#logo-grad)" stroke-width="2" stroke-opacity="0.4" />
  <!-- Foreground solid gradient sheet -->
  <rect x="11" y="5" width="16" height="18" rx="4" fill="url(#logo-grad)" />
